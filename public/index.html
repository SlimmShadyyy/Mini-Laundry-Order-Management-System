<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry System Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">🧺 Laundry Dashboard</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm font-bold">Total Orders</h3>
                <p id="totalOrders" class="text-3xl font-bold text-gray-800">...</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-gray-500 text-sm font-bold">Total Revenue</h3>
                <p id="totalRevenue" class="text-3xl font-bold text-green-600">₹...</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Customer</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Delivery Date</th>
                        <th class="p-4">Total</th>
                    </tr>
                </thead>
                <tbody id="orderList" class="divide-y">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_KEY = 'Bearer LAUNDRY_SECRET_2026';
        const headers = { 'Authorization': API_KEY };

        async function fetchDashboard() {
            try {
                // Fetch Analytics
                const dashRes = await fetch('/api/orders/dashboard', { headers });
                const dashData = await dashRes.json();
                document.getElementById('totalOrders').innerText = dashData.totalOrders;
                document.getElementById('totalRevenue').innerText = `₹${dashData.totalRevenue}`;

                // Fetch Orders
                const orderRes = await fetch('/api/orders', { headers });
                const orders = await orderRes.json();
                
                const tableBody = document.getElementById('orderList');
                tableBody.innerHTML = orders.map(order => `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 font-medium">${order.customer}</td>
                        <td class="p-4"><span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">${order.status}</span></td>
                        <td class="p-4 text-gray-600">${new Date(order.estimatedDelivery).toLocaleDateString()}</td>
                        <td class="p-4 font-bold">₹${order.totalBill}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        fetchDashboard();
    </script>
</body>
</html>
